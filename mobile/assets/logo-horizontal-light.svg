<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="1040" height="240">
  <!-- Light background -->
  <rect width="520" height="120" fill="#FFFFFF"/>

  <!-- K icon mark — red tile -->
  <rect x="20" y="20" width="80" height="80" rx="14" fill="#E94560"/>
  <!-- K — white -->
  <line x1="42" y1="32" x2="42" y2="88"
        stroke="#FFFFFF" stroke-width="11" stroke-linecap="round"/>
  <line x1="47" y1="60" x2="89" y2="32"
        stroke="#FFFFFF" stroke-width="9.5" stroke-linecap="round"/>
  <line x1="47" y1="60" x2="89" y2="88"
        stroke="#FFFFFF" stroke-width="9.5" stroke-linecap="round"/>

  <!-- KYROO wordmark — near-black -->
  <text x="120" y="83"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="58"
        letter-spacing="7"
        fill="#0A0A0A">KYROO</text>
</svg>
