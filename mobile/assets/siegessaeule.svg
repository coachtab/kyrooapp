<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0a0f"/>
      <stop offset="0.25" stop-color="#1a0e15"/>
      <stop offset="0.55" stop-color="#12080e"/>
      <stop offset="1" stop-color="#080608"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E94560" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#E94560" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="col" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e2430"/>
      <stop offset="0.5" stop-color="#201a1e"/>
      <stop offset="1" stop-color="#161216"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.22" r="0.3">
      <stop offset="0" stop-color="#E94560" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#E94560" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1080" height="1920" fill="url(#sky)"/>
  <!-- Accent glow behind Victoria -->
  <rect width="1080" height="1920" fill="url(#glow)"/>

  <!-- Tiergarten tree line — wide, both sides -->
  <ellipse cx="100"  cy="1340" rx="160" ry="90" fill="#0e0b0d"/>
  <ellipse cx="300"  cy="1360" rx="130" ry="70" fill="#100d0f"/>
  <ellipse cx="480"  cy="1350" rx="110" ry="75" fill="#0f0c0e"/>
  <ellipse cx="600"  cy="1365" rx="90"  ry="60" fill="#100d0f"/>
  <ellipse cx="780"  cy="1340" rx="150" ry="85" fill="#0e0b0d"/>
  <ellipse cx="960"  cy="1355" rx="140" ry="80" fill="#0f0c0e"/>
  <ellipse cx="0"    cy="1360" rx="100" ry="70" fill="#0d0a0c"/>
  <ellipse cx="1080" cy="1350" rx="110" ry="75" fill="#0d0a0c"/>
  <rect x="0" y="1390" width="1080" height="530" fill="#0a080a"/>

  <!-- Column base — centered -->
  <rect x="390" y="1200" width="300" height="190" rx="6" fill="url(#col)"/>
  <!-- Base bands -->
  <rect x="380" y="1190" width="320" height="16" rx="3" fill="#2e2430"/>
  <rect x="380" y="1384" width="320" height="10" rx="3" fill="#1c1618"/>
  <!-- Base arches -->
  <rect x="415" y="1240" width="48" height="70" rx="24" fill="#0c090b"/>
  <rect x="480" y="1240" width="48" height="70" rx="24" fill="#0c090b"/>
  <rect x="548" y="1240" width="48" height="70" rx="24" fill="#0c090b"/>
  <rect x="616" y="1240" width="48" height="70" rx="24" fill="#0c090b"/>

  <!-- Column shaft — centered at x=540 -->
  <rect x="490" y="550" width="100" height="640" rx="3" fill="url(#col)"/>
  <!-- Fluting -->
  <line x1="510" y1="558" x2="510" y2="1185" stroke="#1c1618" stroke-width="1" opacity="0.4"/>
  <line x1="530" y1="558" x2="530" y2="1185" stroke="#1c1618" stroke-width="1" opacity="0.4"/>
  <line x1="550" y1="558" x2="550" y2="1185" stroke="#1c1618" stroke-width="1" opacity="0.4"/>
  <line x1="570" y1="558" x2="570" y2="1185" stroke="#1c1618" stroke-width="1" opacity="0.4"/>
  <!-- Gilded ring bands -->
  <rect x="485" y="680" width="110" height="10" rx="2" fill="#E94560" opacity="0.14"/>
  <rect x="485" y="840" width="110" height="10" rx="2" fill="#E94560" opacity="0.11"/>
  <rect x="485" y="1000" width="110" height="10" rx="2" fill="#E94560" opacity="0.09"/>

  <!-- Capital -->
  <rect x="470" y="530" width="140" height="26" rx="5" fill="#2e2430"/>
  <rect x="480" y="510" width="120" height="26" rx="5" fill="#322630"/>

  <!-- Victoria platform -->
  <rect x="500" y="490" width="80" height="26" rx="3" fill="#2e2430"/>

  <!-- Victoria statue -->
  <!-- Body -->
  <ellipse cx="540" cy="455" rx="26" ry="40" fill="url(#gold)"/>
  <!-- Head -->
  <circle cx="540" cy="405" r="16" fill="url(#gold)"/>
  <!-- Raised arm with laurel wreath -->
  <line x1="538" y1="408" x2="528" y2="365" stroke="#E94560" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="526" cy="358" r="10" fill="none" stroke="#E94560" stroke-width="2.5" opacity="0.7"/>
  <!-- Staff -->
  <line x1="548" y1="430" x2="560" y2="380" stroke="#E94560" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Cross on staff top -->
  <line x1="556" y1="376" x2="564" y2="376" stroke="#E94560" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Wings -->
  <path d="M514 440 Q480 415 445 428 Q460 410 485 414 Q496 406 514 425Z" fill="url(#gold)" opacity="0.8"/>
  <path d="M566 440 Q600 415 635 428 Q620 410 595 414 Q584 406 566 425Z" fill="url(#gold)" opacity="0.8"/>
  <!-- Robe -->
  <path d="M518 488 L526 455 L554 455 L562 488Z" fill="url(#gold)" opacity="0.55"/>

  <!-- Stars -->
  <circle cx="140" cy="160" r="1.5" fill="#fff" opacity="0.15"/>
  <circle cx="890" cy="220" r="1.5" fill="#fff" opacity="0.12"/>
  <circle cx="280" cy="300" r="1.2" fill="#fff" opacity="0.10"/>
  <circle cx="800" cy="120" r="1.2" fill="#fff" opacity="0.13"/>
  <circle cx="100" cy="440" r="1" fill="#fff" opacity="0.08"/>
  <circle cx="950" cy="500" r="1" fill="#fff" opacity="0.08"/>
  <circle cx="200" cy="600" r="0.8" fill="#fff" opacity="0.06"/>
  <circle cx="850" cy="700" r="0.8" fill="#fff" opacity="0.06"/>
</svg>
