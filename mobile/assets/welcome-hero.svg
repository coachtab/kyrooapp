<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="0.4" stop-color="#0e080c"/>
      <stop offset="0.7" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#060608"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.35">
      <stop offset="0" stop-color="#E94560" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#E94560" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorGlow" cx="0.5" cy="0" r="0.6">
      <stop offset="0" stop-color="#E94560" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#E94560" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E94560" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#E94560" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#888" stop-opacity="0.3"/>
      <stop offset="0.5" stop-color="#aaa" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#888" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#sky)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>

  <!-- Floor line -->
  <rect x="0" y="1340" width="1080" height="1" fill="#E94560" opacity="0.08"/>
  <rect x="0" y="1340" width="1080" height="580" fill="url(#floorGlow)"/>

  <!-- === Figure: person doing overhead press === -->
  <!-- Standing tall, barbell overhead — power pose -->

  <!-- Legs -->
  <!-- Left leg -->
  <line x1="510" y1="1200" x2="480" y2="1340" stroke="url(#body)" stroke-width="22" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="570" y1="1200" x2="600" y2="1340" stroke="url(#body)" stroke-width="22" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="480" y1="1335" x2="460" y2="1340" stroke="#E94560" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="600" y1="1335" x2="620" y2="1340" stroke="#E94560" stroke-width="12" stroke-linecap="round" opacity="0.5"/>

  <!-- Torso -->
  <line x1="540" y1="1190" x2="540" y2="980" stroke="url(#body)" stroke-width="30" stroke-linecap="round"/>
  <!-- Chest broadening -->
  <line x1="505" y1="1020" x2="575" y2="1020" stroke="url(#body)" stroke-width="20" stroke-linecap="round" opacity="0.4"/>

  <!-- Head -->
  <circle cx="540" cy="930" r="30" fill="url(#body)"/>

  <!-- Arms — raised overhead holding barbell -->
  <!-- Left arm -->
  <line x1="510" y1="1000" x2="480" y2="920" stroke="url(#body)" stroke-width="16" stroke-linecap="round"/>
  <line x1="480" y1="920" x2="420" y2="810" stroke="url(#body)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="570" y1="1000" x2="600" y2="920" stroke="url(#body)" stroke-width="16" stroke-linecap="round"/>
  <line x1="600" y1="920" x2="660" y2="810" stroke="url(#body)" stroke-width="14" stroke-linecap="round"/>

  <!-- Barbell -->
  <!-- Bar -->
  <line x1="300" y1="805" x2="780" y2="805" stroke="url(#bar)" stroke-width="8" stroke-linecap="round"/>
  <!-- Left plates -->
  <rect x="310" y="770" width="20" height="70" rx="4" fill="#E94560" opacity="0.6"/>
  <rect x="340" y="780" width="16" height="50" rx="3" fill="#E94560" opacity="0.45"/>
  <rect x="362" y="785" width="12" height="40" rx="3" fill="#E94560" opacity="0.3"/>
  <!-- Right plates -->
  <rect x="750" y="770" width="20" height="70" rx="4" fill="#E94560" opacity="0.6"/>
  <rect x="724" y="780" width="16" height="50" rx="3" fill="#E94560" opacity="0.45"/>
  <rect x="706" y="785" width="12" height="40" rx="3" fill="#E94560" opacity="0.3"/>

  <!-- Joint highlights — accent dots on key points -->
  <circle cx="420" cy="810" r="6" fill="#E94560" opacity="0.7"/>
  <circle cx="660" cy="810" r="6" fill="#E94560" opacity="0.7"/>
  <circle cx="480" cy="920" r="5" fill="#E94560" opacity="0.5"/>
  <circle cx="600" cy="920" r="5" fill="#E94560" opacity="0.5"/>
  <circle cx="480" cy="1340" r="5" fill="#E94560" opacity="0.4"/>
  <circle cx="600" cy="1340" r="5" fill="#E94560" opacity="0.4"/>

  <!-- Subtle motion lines / energy arcs around barbell -->
  <path d="M380 760 Q390 740 410 745" fill="none" stroke="#E94560" stroke-width="1.5" opacity="0.2"/>
  <path d="M700 760 Q690 740 670 745" fill="none" stroke="#E94560" stroke-width="1.5" opacity="0.2"/>
  <path d="M350 790 Q340 770 360 765" fill="none" stroke="#E94560" stroke-width="1" opacity="0.15"/>
  <path d="M730 790 Q740 770 720 765" fill="none" stroke="#E94560" stroke-width="1" opacity="0.15"/>

  <!-- Subtle grid/measurement lines in background -->
  <line x1="200" y1="600" x2="200" y2="1400" stroke="#E94560" stroke-width="0.5" opacity="0.03"/>
  <line x1="880" y1="600" x2="880" y2="1400" stroke="#E94560" stroke-width="0.5" opacity="0.03"/>
  <line x1="150" y1="1100" x2="930" y2="1100" stroke="#E94560" stroke-width="0.5" opacity="0.03"/>

  <!-- Stars / ambient dots -->
  <circle cx="180" cy="300" r="1.2" fill="#fff" opacity="0.08"/>
  <circle cx="850" cy="250" r="1" fill="#fff" opacity="0.06"/>
  <circle cx="300" cy="500" r="0.8" fill="#fff" opacity="0.05"/>
  <circle cx="800" cy="550" r="0.8" fill="#fff" opacity="0.05"/>
</svg>
