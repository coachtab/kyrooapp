<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.45">
      <stop offset="0" stop-color="#E94560" stop-opacity="0.10"/>
      <stop offset="0.7" stop-color="#E94560" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#E94560" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E94560" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#E94560" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#888" stop-opacity="0.3"/>
      <stop offset="0.5" stop-color="#aaa" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#888" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Solid black background — no gradients that create visible edges -->
  <rect width="1080" height="1920" fill="#000000"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>

  <!-- === Figure: person doing overhead press === -->

  <!-- Legs -->
  <line x1="510" y1="1150" x2="475" y2="1310" stroke="url(#body)" stroke-width="24" stroke-linecap="round"/>
  <line x1="570" y1="1150" x2="605" y2="1310" stroke="url(#body)" stroke-width="24" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="475" y1="1305" x2="452" y2="1315" stroke="#E94560" stroke-width="14" stroke-linecap="round" opacity="0.45"/>
  <line x1="605" y1="1305" x2="628" y2="1315" stroke="#E94560" stroke-width="14" stroke-linecap="round" opacity="0.45"/>

  <!-- Torso -->
  <line x1="540" y1="1140" x2="540" y2="930" stroke="url(#body)" stroke-width="32" stroke-linecap="round"/>
  <!-- Chest -->
  <line x1="502" y1="970" x2="578" y2="970" stroke="url(#body)" stroke-width="22" stroke-linecap="round" opacity="0.35"/>

  <!-- Head -->
  <circle cx="540" cy="880" r="32" fill="url(#body)"/>

  <!-- Arms — raised overhead holding barbell -->
  <line x1="508" y1="950" x2="475" y2="870" stroke="url(#body)" stroke-width="18" stroke-linecap="round"/>
  <line x1="475" y1="870" x2="410" y2="755" stroke="url(#body)" stroke-width="15" stroke-linecap="round"/>
  <line x1="572" y1="950" x2="605" y2="870" stroke="url(#body)" stroke-width="18" stroke-linecap="round"/>
  <line x1="605" y1="870" x2="670" y2="755" stroke="url(#body)" stroke-width="15" stroke-linecap="round"/>

  <!-- Barbell -->
  <line x1="280" y1="750" x2="800" y2="750" stroke="url(#bar)" stroke-width="8" stroke-linecap="round"/>
  <!-- Left plates -->
  <rect x="290" y="714" width="22" height="72" rx="5" fill="#E94560" opacity="0.55"/>
  <rect x="322" y="724" width="18" height="52" rx="4" fill="#E94560" opacity="0.4"/>
  <rect x="346" y="730" width="14" height="40" rx="3" fill="#E94560" opacity="0.28"/>
  <!-- Right plates -->
  <rect x="768" y="714" width="22" height="72" rx="5" fill="#E94560" opacity="0.55"/>
  <rect x="740" y="724" width="18" height="52" rx="4" fill="#E94560" opacity="0.4"/>
  <rect x="720" y="730" width="14" height="40" rx="3" fill="#E94560" opacity="0.28"/>

  <!-- Joint highlights -->
  <circle cx="410" cy="755" r="6" fill="#E94560" opacity="0.65"/>
  <circle cx="670" cy="755" r="6" fill="#E94560" opacity="0.65"/>
  <circle cx="475" cy="870" r="5" fill="#E94560" opacity="0.45"/>
  <circle cx="605" cy="870" r="5" fill="#E94560" opacity="0.45"/>
  <circle cx="475" cy="1310" r="5" fill="#E94560" opacity="0.35"/>
  <circle cx="605" cy="1310" r="5" fill="#E94560" opacity="0.35"/>

  <!-- Energy arcs -->
  <path d="M370 705 Q382 685 400 692" fill="none" stroke="#E94560" stroke-width="1.5" opacity="0.18"/>
  <path d="M710 705 Q698 685 680 692" fill="none" stroke="#E94560" stroke-width="1.5" opacity="0.18"/>
</svg>
