services:
  db:
    image: postgres:16-alpine
    container_name: kyrooapp-db
    environment:
      POSTGRES_DB: kyrooapp
      POSTGRES_USER: kyroo
      POSTGRES_PASSWORD: kyroo_pass
    ports:
      - "${DB_PORT:-15434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyroo -d kyrooapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
